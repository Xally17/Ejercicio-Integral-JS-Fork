<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM (Sin Estilo)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    
    <h1 id="mainTitle" class="text-center">Manipulación del DOM</h1>

    <div class="container d-flex justify-content-center align-items-start min-vh-100 py-5">
        <div class="card p-4 w-100" style="max-width: 500px;">
            <h2 class="text-center mb-4 text-dark">Registro de Usuario</h2>
            <form id="registroForm" novalidate>
                <div class="mb-3">
                    <label for="nombreIpt" class="form-label text-dark">Nombre</label>
                    <input type="text" class="form-control" id="nombreIpt" placeholder="Ej. Juan Pérez">
                    <div id="alertaNombre" class="alert alert-danger mt-2 d-none" role="alert">
                        El nombre debe tener al menos 3 caracteres y contener solo letras.
                    </div>
                </div>
                <div class="mb-3">
                    <label for="emailIpt" class="form-label text-dark">Correo Electrónico</label>
                    <input type="email" class="form-control" id="emailIpt" placeholder="Ej. usuario@dominio.com">
                    <div id="alertaEmail" class="alert alert-danger mt-2 d-none" role="alert">
                        Ingresa un correo electrónico válido.
                    </div>
                </div>
                <div class="mb-3">
                    <label for="edadIpt" class="form-label text-dark">Edad</label>
                    <input type="number" class="form-control" id="edadIpt" placeholder="Ej. 25">
                    <div id="alertaEdad" class="alert alert-danger mt-2 d-none" role="alert">
                        La edad debe ser un número positivo.
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" id="guardarBtn">Guardar</button>
                    <button type="button" class="btn btn-secondary" id="limpiarBtn">Limpiar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
